<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>

<script>

let userProfile = {
    username: " CoolUser99 ",
    bio: " I LOVE coding! JavaScript is Great!!! "
};

function cleanUserBio(profile) {

    let user = profile.username.trim().toLowerCase();

    let bio = profile.bio.trim().toLowerCase();

    bio = bio.replace("javascript", "js");

    let bioLength = bio.length;

    return {
        username: user,
        bio: bio,
        bioLength: bioLength
    };
}

let result = cleanUserBio(userProfile);

console.log(result);

</script>

</body>
</html>
