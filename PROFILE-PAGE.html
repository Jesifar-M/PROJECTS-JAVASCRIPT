<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>

<body>

<button onclick="check()">Check</button>

<p id="result"></p>

<script>

let user = {
    name: "Jesifar",
    age: 23,
    isAdmin: true
};

function check() {

    document.getElementById("result").innerHTML =
    (user.age >= 18 && user.isAdmin)
    ? "Access Granted"
    : "Access Denied";

    console.log("age" in user);

    delete user.age;

    console.log(user);

}

</script>

</body>
</html>
