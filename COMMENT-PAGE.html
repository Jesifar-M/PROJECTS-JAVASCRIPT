<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>

<body>

<script>

// User comment
let comment = "My son is 12 years old. Our flat number is 45 and contact is 9876543210.";

// Check if the comment contains any digits
let hasNumber = /\d/.test(comment);

// Replace all numbers with "NUMBER"
let updatedComment = comment.replace(/\d+/g, "NUMBER");

// Display the results
console.log("Number Found:", hasNumber);
console.log("Updated Comment:", updatedComment);

</script>

</body>
</html>
