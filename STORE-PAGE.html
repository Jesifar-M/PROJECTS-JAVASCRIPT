<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

<h1>Online Store</h1>

<p id="result"></p>
<p id="updated"></p>

<script>

let tshirt = 5;
let tshirtPrice = 400;

let cap = 3;
let capPrice = 150;

// First total
let total = (tshirt * tshirtPrice) + (cap * capPrice);

document.getElementById("result").innerHTML =
"Total Earnings = $" + total;

// Change t-shirt price
tshirtPrice = 450;

// Updated total
total = (tshirt * tshirtPrice) + (cap * capPrice);

document.getElementById("updated").innerHTML =
"Updated Total Earnings = $" + total;

</script>

</body>
</html>
