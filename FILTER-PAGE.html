<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>

<body>

<script>

let comment = "I think this movie was BAD and 100% Stupid! But the Acting was Amazing and 3 actors were great.";

// Replace banned words
let cleanComment = comment.replace(/bad|ugly|stupid/gi, "***");

// Count numbers
let numbers = comment.match(/\d+/g);
let numberCount = numbers ? numbers.length : 0;

// Count capital words
let capitals = comment.match(/\b[A-Z][a-zA-Z]*/g);
let capitalCount = capitals ? capitals.length : 0;

// Output
console.log("Clean Comment:");
console.log(cleanComment);

console.log("Number Count:", numberCount);
console.log("Capital Word Count:", capitalCount);

</script>

</body>
</html>
